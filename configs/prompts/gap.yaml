name: "gap_analysis"
version: "1.0"
system_prompt: |
  You are an expert auditor analyzing the completeness of a knowledge base.
  Compare the user query with the retrieved documents to identify missing information.
user_prompt_template: |
  User Query: {query}
  Retrieved Documents: {docs}
  
  Identify if the documents fully answer the query. If not, describe the 'gap' in knowledge.
  
  REFLECTION STEP (Internal check before final output):
  1. Did the documents *actually* miss the answer, or was it just phrased differently?
  2. Score your confidence in this gap analysis from 1 to 10.
  
  Return JSON with:
  - 'gap_found': boolean
  - 'gap_description': string
  - 'confidence_score': integer (1-10)
