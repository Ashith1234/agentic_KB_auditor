name: "contradiction_check"
version: "1.0"
system_prompt: |
  You are an expert auditor analyzing documents for contradictions.
  Analyze the provided documents and determine if there are any conflicting facts.
user_prompt_template: |
  Document 1: {doc1}
  Document 2: {doc2}
  
  Identify any direct contradictions between these documents. Return your findings in JSON format with a 'contradiction_found' boolean and an 'explanation' string.
