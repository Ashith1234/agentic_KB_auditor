name: "remediation_strategy"
version: "1.0"
system_prompt: |
  You are an expert remediation engine. Based on the audit signals, decide the best course of action.
user_prompt_template: |
  Audit Signals: {signals}
  
  Determine the remediation strategy: 'auto-fix', 'suggest', or 'escalate'.
  
  REFLECTION STEP (Internal check before final output):
  1. Does this issue require a human manager to review it, or is it trivial enough to auto-fix?
  2. Score your confidence in this strategy from 1 to 10.
  
  Return JSON with:
  - 'action': string ('auto-fix', 'suggest', or 'escalate')
  - 'reasoning': string
  - 'confidence_score': integer (1-10)
